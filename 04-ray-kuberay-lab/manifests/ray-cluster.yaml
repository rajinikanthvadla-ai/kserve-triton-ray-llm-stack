# RayCluster (KubeRay CRD) — minimal CPU demo: head node only (workers: 0).
# Requires: kuberay-operator installed (see scripts/02-install-kuberay.sh).
# Reference: https://docs.ray.io/en/latest/cluster/kubernetes/getting-started.html
#
# Ray / KubeRay versions are pinned for reproducible class demos.
---
apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: ray-lab-mini
  namespace: ray-lab
  labels:
    app.kubernetes.io/name: ray-lab-mini
spec:
  rayVersion: "2.9.0"
  headGroupSpec:
    serviceType: ClusterIP
    rayStartParams:
      dashboard-host: "0.0.0.0"
    template:
      metadata:
        labels: {}
      spec:
        containers:
          - name: ray-head
            image: rayproject/ray:2.9.0
            ports:
              - containerPort: 6379
                name: gcs
              - containerPort: 8265
                name: dashboard
              - containerPort: 10001
                name: client
            lifecycle:
              preStop:
                exec:
                  command: ["/bin/sh", "-c", "ray stop"]
            volumeMounts:
              - mountPath: /tmp/ray
                name: ray-logs
            resources:
              limits:
                cpu: "1"
                memory: "2Gi"
              requests:
                cpu: "500m"
                memory: "1536Mi"
        volumes:
          - name: ray-logs
            emptyDir: {}
  workerGroupSpecs:
    - groupName: workers
      replicas: 0
      minReplicas: 0
      maxReplicas: 2
      rayStartParams: {}
      template:
        metadata:
          labels: {}
        spec:
          containers:
            - name: ray-worker
              image: rayproject/ray:2.9.0
              lifecycle:
                preStop:
                  exec:
                    command: ["/bin/sh", "-c", "ray stop"]
              volumeMounts:
                - mountPath: /tmp/ray
                  name: ray-logs
              resources:
                limits:
                  cpu: "1"
                  memory: "1536Mi"
                requests:
                  cpu: "250m"
                  memory: "1Gi"
          volumes:
            - name: ray-logs
              emptyDir: {}
