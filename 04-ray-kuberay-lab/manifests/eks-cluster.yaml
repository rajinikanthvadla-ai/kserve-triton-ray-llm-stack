# EKS cluster for Lab 4 — Ray + KubeRay (CPU nodes)
# Cost: ~$0.20/hr (control plane + 2x t3.medium)
# Time: ~15–20 minutes

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: ray-kuberay-lab
  region: ap-south-1
  version: "1.32"

managedNodeGroups:
  - name: cpu-workers
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 2
    volumeSize: 30
    volumeType: gp3
    ssh:
      allow: false
    labels:
      role: ray-kuberay-worker
      environment: lab
    tags:
      Project: ray-kuberay-lab
      Environment: lab
      ManagedBy: eksctl

iam:
  withOIDC: true
