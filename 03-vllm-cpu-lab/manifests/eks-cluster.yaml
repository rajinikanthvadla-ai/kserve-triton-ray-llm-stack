# ==============================================================================
# EKS cluster for Lab 3 — vLLM CPU (standalone; no KServe required)
# ==============================================================================
# Cost: ~$0.20/hr (EKS control plane + 2x t3.medium)
# Time: ~15–20 minutes to provision
# ==============================================================================

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: vllm-cpu-lab
  region: ap-south-1
  version: "1.32"

managedNodeGroups:
  - name: cpu-workers
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 2
    volumeSize: 30
    volumeType: gp3
    ssh:
      allow: false
    labels:
      role: vllm-cpu-worker
      environment: lab
    tags:
      Project: vllm-cpu-lab
      Environment: lab
      ManagedBy: eksctl

iam:
  withOIDC: true
